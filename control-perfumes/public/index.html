<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Stock - Perfumes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>✨ Control de Stock de Perfumes</h1>

    <!-- Formulario para agregar perfume -->
    <div class="form-card">
      <h2>Agregar perfume</h2>
      <input type="text" id="nombre" placeholder="Nombre (ej: Eau de Parfum)">
      <input type="text" id="marca" placeholder="Marca (ej: Chanel)">
      <input type="number" id="cantidad" placeholder="Cantidad inicial">
      <input type="number" id="precio" placeholder="Precio de venta">
      <button id="btnAgregar">➕ Agregar</button>
    </div>

    <!-- Listado de perfumes -->
    <div class="stock-table">
      <h2>Stock actual</h2>
      <table id="tablaPerfumes">
        <thead>
          <tr><th>ID</th><th>Nombre</th><th>Marca</th><th>Stock</th><th>Precio</th><th>Acciones</th></tr>
        </thead>
        <tbody id="tbodyPerfumes"></tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
